                            <h1>Spicy Tuna Crispy Rice</h1>
              <div class="ns-meta">
                <span><strong>Prep:</strong> 25 minutes</span>
                <span><strong>Cook:</strong> 20 minutes (plus 1 hour for rice to chill)</span>
                <span><strong>Servings:</strong> Makes about 16 pieces</span>
              </div>
                              <h2>A Bite of Umami Bliss</h2>
                <p><em>Forget reservations! These Spicy Tuna Crispy Rice bites bring the trendy Japanese appetizer straight to your kitchen. The contrast between the warm, crunchy rice patty and the cool, savory tuna topping is simply irresistible. Perfect for parties, gatherings, or a sophisticated snack.</em></p>
                            
                              <h2>Materials</h2>
                <ul><li>1 cup sushi rice, cooked</li><li>2 tbsp rice vinegar</li><li>1 tsp sugar</li><li>1/2 lb sashimi-grade tuna, finely chopped</li><li>3 tbsp Japanese mayonnaise (Kewpie)</li><li>1 tbsp sriracha</li><li>1 tsp sesame oil</li><li>1 scallion, thinly sliced</li><li>Vegetable oil for frying</li><li>Thinly sliced jalapeño for garnish (optional)</li><li>Toasted sesame seeds for garnish</li></ul>
              
                              <h2>Preparation</h2>
                <ol><li>Cook sushi rice according to package directions. While warm, mix in the rice vinegar and sugar.</li><li>Press the seasoned rice firmly into a small rectangular pan or baking dish, about 1/2 inch thick. Chill in the refrigerator for at least 1 hour, or until firm.</li><li>While the rice chills, prepare the tuna. In a medium bowl, combine the finely chopped tuna, Japanese mayonnaise, sriracha, sesame oil, and sliced scallions. Mix gently until just combined. Refrigerate until ready to use.</li></ol>
              
                              <h2>Cooking</h2>
                <ol><li>Once the rice is firm, cut it into small rectangles (about 1x2 inches).</li><li>In a large skillet, heat about an inch of vegetable oil over medium-high heat.</li><li>Carefully fry the rice patties in batches for 2-3 minutes per side, until golden brown and crispy. Transfer to a paper towel-lined plate to drain excess oil.</li></ol>
