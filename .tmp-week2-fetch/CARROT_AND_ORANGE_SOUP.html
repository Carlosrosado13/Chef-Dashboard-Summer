                            <h1>Sunny Carrot and Orange Soup with Toasted Almonds</h1>
              <div class="ns-meta">
                <span><strong>Prep:</strong> 15 minutes</span>
                <span><strong>Cook:</strong> 25 minutes</span>
                <span><strong>Servings:</strong> 4</span>
              </div>
                              <h2>Sunshine in a Spoon</h2>
                <p><em>Brighten up any day with this cheerful and uplifting soup. The classic pairing of carrot and orange creates a beautifully balanced flavor profile that is both sweet and tangy. A hint of thyme adds a subtle savory note, and the toasted slivered almonds provide a perfect textural contrast. It’s a simple, elegant soup that tastes as good as it looks.</em></p>
                            
                              <h2>Materials</h2>
                <ul><li>1 tablespoon butter or olive oil</li><li>1 medium onion, chopped</li><li>1 lb carrots, peeled and sliced</li><li>4 cups vegetable broth</li><li>Zest and juice of 1 large orange</li><li>1 teaspoon fresh thyme leaves (or 1/2 tsp dried)</li><li>Salt and white pepper to taste</li><li>1/4 cup slivered almonds, toasted</li></ul>
              
                              <h2>Preparation</h2>
                <ol><li>Chop the onion and slice the carrots.</li><li>Zest and juice the orange.</li><li>If using fresh thyme, strip the leaves from the stems.</li><li>Toast the slivered almonds in a dry pan over medium heat until lightly golden and fragrant. Set aside.</li></ol>
              
                              <h2>Cooking</h2>
                <ol><li>In a medium pot, melt the butter or heat the olive oil over medium heat. Add the onion and cook until soft, about 5 minutes.</li><li>Add the sliced carrots, vegetable broth, and thyme. Bring to a boil, then reduce heat, cover, and simmer for 15-20 minutes, until the carrots are very tender.</li><li>Remove the pot from the heat. Carefully blend the soup using an immersion blender until it&#039;s velvety smooth.</li><li>Stir in the orange zest and orange juice.</li><li>Season with salt and white pepper to taste. Gently reheat if necessary.</li></ol>
