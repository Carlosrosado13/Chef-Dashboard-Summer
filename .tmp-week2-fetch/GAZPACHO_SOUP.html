                            <h1>Chilled Roasted Red Pepper and Cucumber Gazpacho</h1>
              <div class="ns-meta">
                <span><strong>Prep:</strong> 20 minutes (+ 1 hour chilling time)</span>
                <span><strong>Cook:</strong> 0 minutes</span>
                <span><strong>Servings:</strong> 4</span>
              </div>
                              <h2>Summer in a Spoon</h2>
                <p><em>Beat the heat with a twist on the classic Spanish gazpacho. Instead of a tomato base, we&#039;re using smoky, sweet roasted red peppers as the star. Blended with cool cucumber, tangy lime juice, and rich olive oil, this soup is incredibly light, hydrating, and bursting with flavor. It&#039;s the elegant, effortless appetizer or light lunch your summer has been waiting for.</em></p>
                            
                              <h2>Materials</h2>
                <ul><li>3 large red bell peppers, roasted, peeled, and seeded</li><li>1 large English cucumber, peeled and roughly chopped</li><li>1/2 small red onion, roughly chopped</li><li>1 clove garlic</li><li>2 tbsp extra virgin olive oil</li><li>2 tbsp sherry vinegar</li><li>1/2 tsp cumin</li><li>1/2 cup cold water (or more, for desired consistency)</li><li>Salt and freshly ground black pepper to taste</li><li>Garnish: Diced avocado, chopped cilantro, a drizzle of olive oil</li></ul>
              
                              <h2>Preparation</h2>
                <ol><li>Use jarred roasted red peppers or roast your own and allow them to cool completely.</li><li>Peel and chop the cucumber and red onion. Peel the garlic clove.</li></ol>
              
                              <h2>Cooking</h2>
                <ol><li>Combine the roasted red peppers, chopped cucumber, red onion, garlic, olive oil, sherry vinegar, and cumin in a high-speed blender.</li><li>Blend on high until the mixture is completely smooth and silky.</li><li>With the blender running on low, slowly stream in the cold water until you reach your desired consistency.</li><li>Season generously with salt and pepper. Taste and adjust vinegar or salt as needed.</li><li>Transfer the gazpacho to a container and chill in the refrigerator for at least 1 hour, or until thoroughly cold.</li></ol>
