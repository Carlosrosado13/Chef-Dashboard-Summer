<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Admin</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="dashboard admin-dashboard">
    <header class="dashboard-header">
      <div>
        <p class="dashboard-eyebrow">Safe editing workflow</p>
        <h1>Recipe Admin</h1>
      </div>
      <div class="admin-header-status">
        <p id="auth-status" class="dashboard-status" role="status">Checking authentication...</p>
        <p id="admin-status" class="dashboard-status" role="status">Admin locked</p>
        <button id="admin-logout" class="filter-button" type="button" hidden>Log out</button>
      </div>
    </header>

    <section id="admin-error" class="frontend-error" role="alert" hidden></section>

    <section id="admin-auth-root" class="admin-auth-panel admin-panel" aria-label="Admin login"></section>

    <section id="admin-content" class="admin-layout" aria-label="Recipe management" hidden>
      <aside class="admin-panel recipe-list-panel">
        <h2>Recipes</h2>
        <button id="create-recipe-button" class="filter-button create-recipe-button" type="button">Create New Recipe</button>
        <label class="admin-field">
          <span>Search recipes</span>
          <input id="recipe-search" type="search" placeholder="Search by title or category">
        </label>
        <div id="recipe-list" class="recipe-list" aria-label="Recipe list"></div>
      </aside>

      <section class="admin-panel recipe-editor-panel">
        <div id="draft-status" class="draft-status">No draft loaded.</div>
        <div id="recipe-editor-root"></div>
      </section>

      <aside class="admin-panel validation-panel">
        <h2>Validation</h2>
        <div id="validation-root"></div>
        <h2>Patch Preview</h2>
        <div id="patch-preview-root"></div>
      </aside>
    </section>
  </main>

  <script type="module" src="js/adminRecipeEditor.js"></script>
</body>
</html>
