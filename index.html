<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chef Dashboard Summer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main id="dashboard-top" class="dashboard">
    <header class="dashboard-header">
      <div>
        <p class="dashboard-eyebrow">Processed menu rotation</p>
        <h1>Winter Menu Dashboard</h1>
      </div>
      <p id="menu-status" class="dashboard-status" role="status">Loading menu data...</p>
    </header>

    <nav class="dashboard-section-nav" aria-label="Dashboard sections">
      <a href="#menu-root">Menu</a>
      <a href="#ingredient-root">Ingredients</a>
      <a href="#inventory-root">Inventory</a>
      <a href="#purchase-order-root">Orders</a>
      <a href="#analytics-root">Analytics</a>
    </nav>

    <details id="dashboard-controls" class="dashboard-controls" aria-label="Menu filters" open>
      <summary class="dashboard-controls__summary">Menu Controls</summary>
      <div class="dashboard-controls__body">
        <div class="control-group">
          <h2>View</h2>
          <div id="view-filter" class="filter-buttons" aria-label="Select view mode"></div>
        </div>
        <div class="control-group">
          <h2>Meal</h2>
          <div id="meal-filter" class="filter-buttons" aria-label="Select meal type"></div>
        </div>
        <div class="control-group">
          <h2>Week</h2>
          <div id="week-filter" class="filter-buttons" aria-label="Select week"></div>
        </div>
        <div class="control-group">
          <h2>Day</h2>
          <div id="day-filter" class="filter-buttons" aria-label="Select day"></div>
        </div>
        <div class="control-group quick-switch-group">
          <h2>Switch</h2>
          <div class="quick-switch-buttons" aria-label="Quick week and day switching">
            <button id="previous-week" class="filter-button" type="button">Prev Week</button>
            <button id="next-week" class="filter-button" type="button">Next Week</button>
            <button id="previous-day" class="filter-button" type="button">Prev Day</button>
            <button id="next-day" class="filter-button" type="button">Next Day</button>
          </div>
        </div>
      </div>
    </details>

    <section id="frontend-error" class="frontend-error" role="alert" hidden></section>
    <section id="menu-root" class="menu-root" aria-live="polite"></section>
    <section id="ingredient-root" class="ingredient-root" aria-live="polite"></section>
    <section id="inventory-root" class="inventory-root" aria-live="polite"></section>
    <section id="purchase-order-root" class="purchase-order-root" aria-live="polite"></section>
    <section id="food-cost-root" class="food-cost-root" aria-live="polite"></section>
    <section id="analytics-root" class="analytics-root" aria-live="polite"></section>
    <section id="forecast-root" class="forecast-root" aria-live="polite"></section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
