<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chef Dashboard Summer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main id="dashboard-top" class="dashboard">
    <header class="dashboard-header">
      <div>
        <p class="dashboard-eyebrow">Processed menu rotation</p>
        <h1>Summer Menu Dashboard</h1>
      </div>
      <p id="menu-status" class="dashboard-status" role="status">Loading menu data...</p>
    </header>

    <nav class="platform-nav" aria-label="Platform navigation">
      <button class="platform-nav__button" type="button" data-platform-view="dashboard" aria-pressed="true">Dashboard</button>
      <button class="platform-nav__button" type="button" data-platform-view="admin" aria-pressed="false">Admin</button>
    </nav>

    <section id="dashboard-view" class="platform-view" data-platform-panel="dashboard">
      <nav class="dashboard-section-nav" aria-label="Dashboard sections">
        <a href="#menu-root">Menu</a>
        <a href="#ingredient-root">Ingredients</a>
        <a href="#inventory-root">Inventory</a>
        <a href="#purchase-order-root">Orders</a>
        <a href="#analytics-root">Analytics</a>
      </nav>

      <section id="dashboard-controls" class="dashboard-toolbar" aria-label="Menu filters">
        <div class="dashboard-toolbar__body" role="toolbar" aria-label="Operational menu controls">
          <div class="toolbar-field">
            <span class="toolbar-field__label">Meal</span>
            <div id="meal-filter" class="filter-buttons" aria-label="Select meal type"></div>
          </div>
          <div class="toolbar-field">
            <span class="toolbar-field__label">View</span>
            <div id="view-filter" class="filter-buttons" aria-label="Select view mode"></div>
          </div>
          <div class="toolbar-field">
            <label class="toolbar-field__label" for="week-select">Week</label>
            <div id="week-filter" class="select-filter" aria-label="Select week"></div>
          </div>
          <div class="toolbar-field">
            <label class="toolbar-field__label" for="day-select">Day</label>
            <div id="day-filter" class="select-filter" aria-label="Select day"></div>
          </div>
          <div class="toolbar-field toolbar-field--switch">
            <span class="toolbar-field__label">Switch</span>
            <div class="quick-switch-buttons" aria-label="Quick week and day switching">
              <button id="previous-week" class="filter-button" type="button">Prev Week</button>
              <button id="next-week" class="filter-button" type="button">Next Week</button>
              <button id="previous-day" class="filter-button" type="button">Prev Day</button>
              <button id="next-day" class="filter-button" type="button">Next Day</button>
            </div>
          </div>
        </div>
      </section>

      <section id="frontend-error" class="frontend-error" role="alert" hidden></section>
      <section id="menu-root" class="menu-root" aria-live="polite"></section>
      <section id="ingredient-root" class="ingredient-root" aria-live="polite"></section>
      <section id="inventory-root" class="inventory-root" aria-live="polite"></section>
      <section id="purchase-order-root" class="purchase-order-root" aria-live="polite"></section>
      <section id="food-cost-root" class="food-cost-root" aria-live="polite"></section>
      <section id="analytics-root" class="analytics-root" aria-live="polite"></section>
      <section id="forecast-root" class="forecast-root" aria-live="polite"></section>
    </section>

    <section id="admin-view" class="platform-view platform-view--admin" data-platform-panel="admin" hidden>
      <header class="platform-admin-header">
        <div>
          <p class="dashboard-eyebrow">Protected workspace</p>
          <h2>Admin Operations</h2>
        </div>
        <a class="filter-button platform-admin-link" href="admin.html">Open full admin</a>
      </header>
      <iframe id="admin-frame" class="platform-admin-frame" title="Admin workspace" data-src="admin.html"></iframe>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/platformNavigation.js"></script>
</body>
</html>
