<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chef Dashboard Summer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="dashboard">
    <header class="dashboard-header">
      <div>
        <p class="dashboard-eyebrow">Processed menu rotation</p>
        <h1>Winter Menu Dashboard</h1>
      </div>
      <p id="menu-status" class="dashboard-status" role="status">Loading menu data...</p>
    </header>

    <section class="dashboard-controls" aria-label="Menu filters">
      <h2>Weeks</h2>
      <div id="week-filter" class="week-filter" aria-label="Select week"></div>
    </section>

    <section id="menu-root" class="menu-root" aria-live="polite"></section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
